name: Bazel Build

on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SCORE_QNX_USER: ${{ secrets.SCORE_QNX_USER }}
  SCORE_QNX_PASSWORD: ${{ secrets.SCORE_QNX_PASSWORD }}
  SCORE_QNX_LICENSE: ${{ secrets.SCORE_QNX_LICENSE }}
jobs:
  build:
    name: Build Bazel Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: 1.26.0 # newest LTS before 1 Jun 2025
          disk-cache: true
          repository-cache: true
          bazelisk-cache: true

      - name: Bazel info (discover paths)
        id: bazel-info
        run: |
          echo "BAZEL_OUTPUT_BASE=$(bazel info output_base)" >> $GITHUB_ENV
          echo "BAZEL_USER_ROOT=$(bazel info output_user_root)" >> $GITHUB_ENV
          echo "BAZEL_REPO_CACHE=$(bazel info repository_cache)" >> $GITHUB_ENV
          bazel info

      - name: Cache Bazel output base
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BAZEL_OUTPUT_BASE }}/action_cache
            ${{ env.BAZEL_OUTPUT_BASE }}/bazel-out
            ${{ env.BAZEL_OUTPUT_BASE }}/external
            ${{ env.BAZEL_OUTPUT_BASE }}/execroot
          key: bazel-ob-v3-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'MODULE.bazel.lock', '**/*.bzl') }}
          restore-keys: |
            bazel-ob-v3-${{ runner.os }}-

      - name: Build with Bazel
        run: |
          # Exclude targets that are not expected to build the source code, e.g. documentation, format check, live preview, product integration tests.
          # Please execute "bazel query 'kind(rule, //:*)'" to find the list of all excluded targets by this option.
          bazel build --lockfile_mode=error --config x86_64-linux -- \
            //... \
            -//:* \
            -//score/test/component/...

      - name: Test with Bazel
        run: |
          # Component tests run in component_tests.yml; exclude here to avoid pulling in QNX deps.
          bazel test --lockfile_mode=error --config x86_64-linux \
            --test_tag_filters=-no_ci \
            -- //score/... -//score/test/component/...
